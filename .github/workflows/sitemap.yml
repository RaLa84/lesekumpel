name: Generate Sitemap

on:
  push:
    branches: [main]
    paths:
      - 'texte/**.html'
      - 'comicgeschichten/**.html'
      - 'demo-texte/**.html'
      - 'index.html'
      - 'landingpage.html'
      - 'demo.html'
      - 'preise.html'
      - 'ueber-uns.html'
      - 'blog-warum-lesekumpel.html'
      - 'neue-geschichte.html'
      - 'starter.html'
      - 'impressum.html'
      - 'datenschutz.html'
      - 'scripts/generate-sitemap.mjs'
  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Persist credentials so the auto-commit at the end can push back.
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate sitemap.xml
        run: node scripts/generate-sitemap.mjs

      - name: Commit sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --cached --quiet; then
            echo "Keine Änderungen an sitemap.xml"
          else
            git commit -m "Auto: sitemap.xml regeneriert"
            git pull --rebase
            git push
          fi
