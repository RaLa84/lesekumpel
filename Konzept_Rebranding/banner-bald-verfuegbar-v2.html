<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesekumpel · Banner v2 — Bald verfügbar</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --mint:   #2FB8A6;
  --navy:   #2B3140;
  --cream:  #FFF6EF;
  --coral:  #F97352;
  --lila:   #7D6AE6;
  --yellow: #FFD95A;
  --font-heading: 'Fredoka', system-ui, sans-serif;
  --font-body:    'Lexend', system-ui, sans-serif;
}

html, body {
  width: 1104px;
  height: 276px;
  overflow: hidden;
  background: var(--cream);
  font-family: var(--font-body);
  color: var(--navy);
  -webkit-font-smoothing: antialiased;
}

.banner {
  position: relative;
  width: 1104px;
  height: 276px;
  background: var(--cream);
  display: flex;
  align-items: center;
  padding: 0 8px 0 160px;
  gap: 0;
  overflow: hidden;
  isolation: isolate;
}

/* ===== Atmosphäre-Blobs ===== */
.blob {
  position: absolute;
  pointer-events: none;
  z-index: -1;
}
.blob svg { width: 100%; height: 100%; display: block; }

.blob-mint {
  top: -130px; left: -100px;
  width: 290px; height: 290px;
  opacity: 0.18;
  color: var(--mint);
}
.blob-coral {
  bottom: -120px; left: 180px;
  width: 240px; height: 240px;
  opacity: 0.15;
  color: var(--coral);
}
.blob-lila {
  top: -110px; right: 200px;
  width: 230px; height: 230px;
  opacity: 0.14;
  color: var(--lila);
}
.blob-yellow {
  bottom: -80px; right: -60px;
  width: 180px; height: 180px;
  opacity: 0.30;
  color: var(--yellow);
}

/* ===== Content stack ===== */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-end;
  text-align: right;
  gap: 4px;
  position: relative;
  z-index: 2;
  min-width: 0;
  padding-top: 38px;
  padding-bottom: 18px;
  height: 100%;
}

.wordmark {
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 1.85rem;
  line-height: 1;
  letter-spacing: -0.005em;
  color: var(--navy);
  opacity: 0.55;
}

.headline {
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 3rem;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--navy);
  white-space: nowrap;
  margin-top: 6px;
}
.headline .accent {
  color: var(--coral);
}

.subtitle {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 1.1rem;
  line-height: 1.4;
  color: var(--navy);
  opacity: 0.78;
  margin-top: 8px;
}

/* Styleguide-konformer Badge — kompakte Banner-Variante (eleganter, weniger klobig) */
.badge {
  display: inline-block;
  padding: 5px 16px;
  border-radius: 999px;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.9rem;
  line-height: 1.2;
  align-self: flex-end;
  margin-top: 8px;
}
.badge-yellow { background: var(--yellow); color: var(--navy); }

/* ===== Mascot ===== */
.mascot-wrap {
  position: relative;
  width: 260px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.mascot-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(255, 217, 90, 0.50) 0%, rgba(255, 217, 90, 0.16) 38%, rgba(255, 217, 90, 0) 70%);
  z-index: 1;
  pointer-events: none;
}

.bulb-glow {
  position: absolute;
  top: 22px;
  right: 30px;
  width: 90px;
  height: 90px;
  background: radial-gradient(circle, rgba(255, 230, 128, 0.95) 0%, rgba(255, 217, 90, 0.42) 28%, rgba(255, 217, 90, 0) 65%);
  z-index: 2;
  pointer-events: none;
  filter: blur(2px);
}

.mascot {
  position: relative;
  width: 240px;
  height: auto;
  display: block;
  z-index: 3;
  transform: rotate(-3deg);
  filter:
    drop-shadow( 3px  0   0 #FFFFFF)
    drop-shadow(-3px  0   0 #FFFFFF)
    drop-shadow( 0    3px 0 #FFFFFF)
    drop-shadow( 0   -3px 0 #FFFFFF)
    drop-shadow( 2px  2px 0 #FFFFFF)
    drop-shadow(-2px -2px 0 #FFFFFF)
    drop-shadow( 2px -2px 0 #FFFFFF)
    drop-shadow(-2px  2px 0 #FFFFFF)
    drop-shadow(0 12px 20px rgba(43, 49, 64, 0.22))
    drop-shadow(0 0 14px rgba(255, 217, 90, 0.55));
}

.m-sparkle {
  position: absolute;
  z-index: 4;
  pointer-events: none;
}
.m-sparkle svg { width: 100%; height: 100%; display: block; }
.m-sp-1 { top: 22px;  right: 6px;   width: 22px; height: 22px; color: var(--yellow); }
.m-sp-2 { top: 70px;  right: 100px; width: 14px; height: 14px; color: var(--coral); }
.m-sp-3 { top: 130px; left: 6px;    width: 16px; height: 16px; color: var(--yellow); opacity: 0.85; }
.m-sp-4 { bottom: 38px; right: 16px; width: 14px; height: 14px; color: var(--mint); opacity: 0.9; }
</style>
</head>
<body>

<div class="banner">

  <!-- Atmosphäre-Blobs (hinter Content) -->
  <div class="blob blob-mint" aria-hidden="true">
    <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <path fill="currentColor" d="M421.5,316.5Q393,383,335,420.5Q277,458,210.5,432Q144,406,108,343Q72,280,99,209Q126,138,194,103.5Q262,69,331,93Q400,117,433,178.5Q466,240,421.5,316.5Z"/>
    </svg>
  </div>
  <div class="blob blob-coral" aria-hidden="true">
    <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <path fill="currentColor" d="M444,318Q416,386,353,420Q290,454,222,427Q154,400,121,338Q88,276,116,210Q144,144,210,114Q276,84,343,109.5Q410,135,442,202.5Q474,270,444,318Z"/>
    </svg>
  </div>
  <div class="blob blob-lila" aria-hidden="true">
    <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <path fill="currentColor" d="M438,310Q406,380,338,415Q270,450,205,418Q140,386,114,318Q88,250,118,184Q148,118,216,98Q284,78,348,108Q412,138,442,204Q472,270,438,310Z"/>
    </svg>
  </div>
  <div class="blob blob-yellow" aria-hidden="true">
    <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <path fill="currentColor" d="M421.5,316.5Q393,383,335,420.5Q277,458,210.5,432Q144,406,108,343Q72,280,99,209Q126,138,194,103.5Q262,69,331,93Q400,117,433,178.5Q466,240,421.5,316.5Z"/>
    </svg>
  </div>

  <!-- Content Stack -->
  <div class="content">
    <div class="wordmark">Lesekumpel.de</div>
    <h1 class="headline">Lesen lernen <span class="accent">auf eure Art.</span></h1>
    <div class="subtitle">Barrierefreies Lesen, das Spaß macht.</div>
    <span class="badge badge-yellow">Bald verfügbar</span>
  </div>

  <!-- Maskottchen rechts -->
  <div class="mascot-wrap">
    <div class="mascot-glow" aria-hidden="true"></div>
    <div class="bulb-glow" aria-hidden="true"></div>

    <img src="logo-lesekumpel-banner.png" alt="Lesekumpel Buddy" class="mascot">

    <div class="m-sparkle m-sp-1" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
    </div>
    <div class="m-sparkle m-sp-2" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
    </div>
    <div class="m-sparkle m-sp-3" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
    </div>
    <div class="m-sparkle m-sp-4" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
    </div>
  </div>

</div>

</body>
</html>
