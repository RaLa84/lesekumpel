<!--
  ============================================================
  Lesekumpel · Kanonischer Header (Single Source of Truth)
  ============================================================
  EINZIGE Quelle fuer die Navbar. NICHT pro Seite editieren —
  hier aendern und dann propagieren:

      python scripts/apply-header.py --force

  Drei markierte Bloecke:
    - LK-HEADER:CSS     gemeinsame Navbar-CSS (beide Varianten)
    - LK-HEADER:PUBLIC  Markup fuer Root-Seiten (demo.html)
    - LK-HEADER:READING Markup fuer Story-Leseseiten (Unterordner, ../)

  JS bleibt seitenseitig (toggleMenu / openSettings / Avatar) — der
  Header umfasst bewusst nur Markup + CSS.

  Token-robust: differierende Tokens mit Fallback (var(--x, …)), damit
  es sowohl auf demo.html (--border) als auch auf Story-Seiten
  (--border-soft) funktioniert.
-->

/* === LK-HEADER:CSS START === */
    .main-navbar { background: rgba(255,255,255,0.92); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); padding: 12px 24px; border-bottom: 3px solid var(--mint); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; position: sticky; top: 0; z-index: 1000; }

    .nav-avatar-emoji { pointer-events: none; }
    .mobile-menu { display: none; background: #fff; padding: 12px; position: absolute; top: calc(100% + 8px); left: 0; right: auto; width: min(320px, calc(100vw - 24px)); border: 1px solid var(--border, var(--border-soft, #D9D4CC)); border-radius: 20px; box-shadow: 0 16px 40px rgba(43,49,64,0.16); flex-direction: column; gap: 6px; z-index: 999; }
    .mobile-menu.open { display: flex; animation: bubblePop 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    .mobile-menu .nav-btn { display: flex; align-items: center; gap: 12px; padding: 11px 12px; min-height: 44px; border-radius: 10px; background: transparent; color: var(--navy); font-weight: 600; font-size: 0.98rem; transition: background 0.15s ease; }
    .mobile-menu .nav-btn:hover { background: var(--cream-light); color: var(--navy); }
    .mobile-menu .nav-btn svg { width: 18px; height: 18px; color: #8a8f98; flex-shrink: 0; transition: color 0.15s ease; }
    .mobile-menu .nav-btn:hover svg { color: var(--navy); }
    .menu-divider { height: 1px; background: var(--border, var(--border-soft, #D9D4CC)); margin: 6px 6px; }
    .mobile-menu .menu-cta { background: var(--mint); color: var(--navy); justify-content: center; font-family: var(--font-heading); font-weight: 700; margin-top: 4px; box-shadow: 0 3px 10px rgba(47,184,166,0.3); }
    .mobile-menu .menu-cta:hover { background: var(--navy); color: #fff; }
    @keyframes bubblePop { from { opacity: 0; transform: translateY(8px) scale(0.9); } to { opacity: 1; transform: none; } }
    @media (max-width: 767px) { .brand-name { display: none; } }
    @media (min-width: 768px) {

      .nav-logo { transform: scale(2); }
      .brand-name { font-size: 1.6rem; display: block; }
      .nav-left { gap: 15px; }
    }
