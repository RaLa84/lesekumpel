    <script>
        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('open');
        }

        // --- COMIC-DATEN (entspricht YAML-Sidecar aus dem Plan) ---
        const comicData = {
            title: "Tom und Tina spielen Mensch ärgere dich nicht",
            panels: [
                { num: 1, dialog: [
                    { speaker: "Tina", text: "Ich fang an!" }
                ]},
                { num: 2, dialog: [
                    { speaker: "Tina", text: "Eine Sechs!" }
                ]},
                { num: 3, dialog: [
                    { speaker: "Tina", text: "Mensch, ärgere dich nicht!" },
                    { speaker: "Tom",  text: "Meine Figur!" }
                ]},
                { num: 4, dialog: [
                    { speaker: "Tom",  text: "Egal — Kekspause!" },
                    { speaker: "Tina", text: "Beste Idee!" }
                ]}
            ]
        };

        const state = { syllables: false, wordReader: false, dyslexia: false };

        function speakerClass(name) {
            return name.toLowerCase() === "tina" ? "speaker-tina" : "speaker-tom";
        }

        // Silbentrennung-Regex (kopiert aus baerli-sucht-honig.html)
        function colorizeSyllables(word) {
            const parts = word.match(/[^aeiouäöüAEIOUÄÖÜ]*[aeiouäöüAEIOUÄÖÜ]+(?:[^aeiouäöüAEIOUÄÖÜ]*$|[^aeiouäöüAEIOUÄÖÜ](?=[^aeiouäöüAEIOUÄÖÜ]))?/gi) || [word];
            return parts.map((part, i) => {
                const cls = (i % 2 === 0) ? 'syl-blue' : 'syl-red';
                return `<span class="${cls}">${part}</span>`;
            }).join('');
        }

        function renderWord(word) {
            const cleanWord = word.replace(/[.,!?:;()„"]/g, "");
            const display = state.syllables ? colorizeSyllables(word) : word;
            return `<span class="word-interactive" data-word="${cleanWord}" onclick="handleWordClick(this)">${display}</span>`;
        }

        function renderSpeech(text) {
            return text.split(' ').map(renderWord).join(' ');
        }

        function renderPanels() {
            const container = document.getElementById('reading-section');
            container.innerHTML = comicData.panels.map(panel => {
                const lines = panel.dialog.map(line => `
                    <div class="dialog-line">
                        <span class="speaker ${speakerClass(line.speaker)}">${line.speaker}</span>
                        <span class="speech">${renderSpeech(line.text)}</span>
                    </div>
                `).join('');
                return `
                    <div class="panel-card" data-panel="${panel.num}">
                        <span class="panel-num">${panel.num}</span>
                        <span class="panel-label">Panel ${panel.num}</span>
                        ${lines}
                    </div>
                `;
            }).join('');
        }

        // --- VORLESEN: Alle Panels nacheinander, mit Wort-Highlighting ---
        function toggleTTS() {
            const btn = document.getElementById('btn-tts');
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                btn.classList.remove('active');
                clearHighlights();
                return;
            }
            readAllPanels();
            btn.classList.add('active');
        }

        function readAllPanels() {
            const spans = document.querySelectorAll('#reading-section .word-interactive');
            let speechText = "";
            const wordMap = [];
            spans.forEach(span => {
                const word = span.innerText;
                const start = speechText.length;
                speechText += word + " ";
                wordMap.push({ start, end: speechText.length - 1, el: span });
            });

            // Speaker-Namen zusätzlich einfügen: wir gehen panel-für-panel, dialog-für-dialog
            // Da wir aber via spans gehen, lesen wir nur die Texte (ohne Speaker-Tags)
            const u = new SpeechSynthesisUtterance(speechText);
            u.lang = "de-DE";
            u.rate = 0.9;
            u.onboundary = function(event) {
                if (event.name === 'word') {
                    const charIndex = event.charIndex;
                    const current = wordMap.find(w => charIndex >= w.start && charIndex < w.end);
                    clearHighlights();
                    if (current) current.el.classList.add('highlight-active');
                }
            };
            u.onend = function() {
                document.getElementById('btn-tts').classList.remove('active');
                clearHighlights();
            };
            window.speechSynthesis.speak(u);
        }

        function clearHighlights() {
            document.querySelectorAll('.highlight-active').forEach(el => el.classList.remove('highlight-active'));
        }

        // --- WÖRTER HÖREN: Klick auf einzelnes Wort ---
        function toggleWordReader() {
            state.wordReader = !state.wordReader;
            document.getElementById('btn-word-reader').className = state.wordReader ? "tool-btn active" : "tool-btn";
        }

        function handleWordClick(el) {
            if (!state.wordReader) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(el.innerText);
            u.lang = "de-DE";
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        // --- SILBEN-TOGGLE ---
        function toggleSyllables() {
            state.syllables = !state.syllables;
            document.getElementById('btn-syllables').className = state.syllables ? "tool-btn active" : "tool-btn";
            renderPanels();
        }

        // --- DYSLEXIE-TOGGLE ---
        function toggleDyslexia() {
            state.dyslexia = !state.dyslexia;
            document.body.classList.toggle('dyslexia-mode', state.dyslexia);
            document.getElementById('btn-dyslexia').className = state.dyslexia ? "tool-btn active" : "tool-btn";
        }

        // --- SCHRIFTGRÖSSE ---
        function changeFontSize(delta) {
            const cards = document.querySelectorAll('.panel-card');
            cards.forEach(card => {
                const current = parseFloat(window.getComputedStyle(card).fontSize);
                const next = Math.max(14, Math.min(40, current + delta));
                card.style.fontSize = next + 'px';
            });
        }

        renderPanels();
    </script>
