    <script>
        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('open');
        }

        // --- COMIC-DATEN (entspricht YAML-Sidecar aus dem Plan) ---
        const comicData = {
            title: "Tom und Tina spielen Mensch ärgere dich nicht",
            panels: [
                { num: 1, dialog: [
                    { speaker: "Tina", text: "Ich fang an!" }
                ]},
                { num: 2, dialog: [
                    { speaker: "Tina", text: "Eine Sechs!" }
                ]},
                { num: 3, dialog: [
                    { speaker: "Tina", text: "Mensch, ärgere dich nicht!" },
                    { speaker: "Tom",  text: "Meine Figur!" }
                ]},
                { num: 4, dialog: [
                    { speaker: "Tom",  text: "Egal — Kekspause!" },
                    { speaker: "Tina", text: "Beste Idee!" }
                ]}
            ]
        };

        const state = {
            syllables: false,
            wordReader: false,
            dyslexia: false,
            activePanel: 1,
            ttsRunning: false,
            fontSize: 24  // wird auf .panel-card angewendet
        };

        function speakerClass(name) {
            return name.toLowerCase() === "tina" ? "speaker-tina" : "speaker-tom";
        }

        function colorizeSyllables(word) {
            const parts = word.match(/[^aeiouäöüAEIOUÄÖÜ]*[aeiouäöüAEIOUÄÖÜ]+(?:[^aeiouäöüAEIOUÄÖÜ]*$|[^aeiouäöüAEIOUÄÖÜ](?=[^aeiouäöüAEIOUÄÖÜ]))?/gi) || [word];
            return parts.map((part, i) => {
                const cls = (i % 2 === 0) ? 'syl-blue' : 'syl-red';
                return `<span class="${cls}">${part}</span>`;
            }).join('');
        }

        function renderWord(word) {
            const cleanWord = word.replace(/[.,!?:;()„"]/g, "");
            const display = state.syllables ? colorizeSyllables(word) : word;
            return `<span class="word-interactive" data-word="${cleanWord}" onclick="handleWordClick(this)">${display}</span>`;
        }

        function renderSpeech(text) {
            return text.split(' ').map(renderWord).join(' ');
        }

        // --- AKTIVES PANEL RENDERN (nur EINE Karte) ---
        function renderActivePanel() {
            const panel = comicData.panels.find(p => p.num === state.activePanel);
            if (!panel) return;
            const lines = panel.dialog.map(line => `
                <div class="dialog-line">
                    <span class="speaker ${speakerClass(line.speaker)}">${line.speaker}</span>
                    <span class="speech">${renderSpeech(line.text)}</span>
                </div>
            `).join('');
            const container = document.getElementById('panel-card-area');
            container.innerHTML = `
                <div class="panel-card" data-panel="${panel.num}" style="font-size:${state.fontSize}px;">
                    <span class="panel-num">${panel.num}</span>
                    <span class="panel-label">Panel ${panel.num}</span>
                    ${lines}
                </div>
            `;
        }

        function updateHotspots() {
            document.querySelectorAll('.panel-hotspot').forEach(btn => {
                const isActive = parseInt(btn.dataset.panel, 10) === state.activePanel;
                btn.classList.toggle('active', isActive);
                btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });
            document.getElementById('panel-indicator').textContent =
                `Panel ${state.activePanel} von ${comicData.panels.length}`;
        }

        function setActivePanel(n) {
            const total = comicData.panels.length;
            // rolliert (Klick auf Pfeil am Ende geht zum Anfang & umgekehrt — spielerischer)
            if (n < 1) n = total;
            if (n > total) n = 1;
            state.activePanel = n;
            updateHotspots();
            renderActivePanel();
        }

        // --- VORLESEN: kette Utterances pro Panel, wandere mit dem Highlight ---
        function toggleTTS() {
            const btn = document.getElementById('btn-tts');
            if (state.ttsRunning) {
                state.ttsRunning = false;
                window.speechSynthesis.cancel();
                btn.classList.remove('active');
                clearHighlights();
                return;
            }
            state.ttsRunning = true;
            btn.classList.add('active');
            readPanelsSequentially(1);
        }

        function readPanelsSequentially(startNum) {
            const total = comicData.panels.length;
            if (!state.ttsRunning || startNum > total) {
                state.ttsRunning = false;
                document.getElementById('btn-tts').classList.remove('active');
                clearHighlights();
                return;
            }
            setActivePanel(startNum);
            // Nach Render: alle word-interactive der aktuellen Karte sammeln
            const spans = document.querySelectorAll('#panel-card-area .word-interactive');
            let speechText = "";
            const wordMap = [];
            spans.forEach(span => {
                const word = span.innerText;
                const start = speechText.length;
                speechText += word + " ";
                wordMap.push({ start, end: speechText.length - 1, el: span });
            });
            if (!speechText.trim()) {
                readPanelsSequentially(startNum + 1);
                return;
            }
            const u = new SpeechSynthesisUtterance(speechText);
            u.lang = "de-DE";
            u.rate = 0.9;
            u.onboundary = function(event) {
                if (event.name === 'word') {
                    const charIndex = event.charIndex;
                    const current = wordMap.find(w => charIndex >= w.start && charIndex < w.end);
                    clearHighlights();
                    if (current) current.el.classList.add('highlight-active');
                }
            };
            u.onend = function() {
                clearHighlights();
                if (state.ttsRunning) {
                    // kurze Pause zwischen Panels (300 ms)
                    setTimeout(() => readPanelsSequentially(startNum + 1), 300);
                }
            };
            window.speechSynthesis.speak(u);
        }

        function clearHighlights() {
            document.querySelectorAll('.highlight-active').forEach(el => el.classList.remove('highlight-active'));
        }

        // --- WÖRTER HÖREN ---
        function toggleWordReader() {
            state.wordReader = !state.wordReader;
            document.getElementById('btn-word-reader').className = state.wordReader ? "tool-btn active" : "tool-btn";
        }

        function handleWordClick(el) {
            if (!state.wordReader) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(el.innerText);
            u.lang = "de-DE";
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        // --- SILBEN-TOGGLE ---
        function toggleSyllables() {
            state.syllables = !state.syllables;
            document.getElementById('btn-syllables').className = state.syllables ? "tool-btn active" : "tool-btn";
            renderActivePanel();
        }

        // --- DYSLEXIE-TOGGLE ---
        function toggleDyslexia() {
            state.dyslexia = !state.dyslexia;
            document.body.classList.toggle('dyslexia-mode', state.dyslexia);
            document.getElementById('btn-dyslexia').className = state.dyslexia ? "tool-btn active" : "tool-btn";
        }

        // --- SCHRIFTGRÖSSE ---
        function changeFontSize(delta) {
            state.fontSize = Math.max(14, Math.min(40, state.fontSize + delta));
            const card = document.querySelector('.panel-card');
            if (card) card.style.fontSize = state.fontSize + 'px';
        }

        // --- HOTSPOTS, NAV-ARROWS, KEYBOARD ---
        document.querySelectorAll('.panel-hotspot').forEach(btn => {
            btn.addEventListener('click', () => {
                setActivePanel(parseInt(btn.dataset.panel, 10));
            });
        });
        document.getElementById('btn-prev-panel').addEventListener('click', () => {
            setActivePanel(state.activePanel - 1);
        });
        document.getElementById('btn-next-panel').addEventListener('click', () => {
            setActivePanel(state.activePanel + 1);
        });
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowLeft')  { setActivePanel(state.activePanel - 1); }
            if (e.key === 'ArrowRight') { setActivePanel(state.activePanel + 1); }
        });

        // Initial-Render
        updateHotspots();
        renderActivePanel();
    </script>
</body>
</html>
